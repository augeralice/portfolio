<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PORTFOLIO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo" onclick="goHome()">ALICE AUGER</div>
    <button id="burger" aria-label="Menu" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav id="main-nav">
      <a href="#">PROJETS</a>
      <a href="#">SERVICES</a>
      <a href="#">CONTACT</a>
    </nav>
  </header>

  <!-- PAGE PRINCIPALE -->
  <div class="container" id="main-container">
    <div class="column" id="left-col">
      <div class="image-box" data-project="proj1"><img src="image/client-logo(1).webp" alt="Projet 1"></div>
      <div class="image-box" data-project="proj2"><img src="image/client-illu(1).webp" alt="Projet 2"></div>
      <div class="image-box" data-project="proj3"><img src="image/client-calli(1).webp" alt="Projet 3"></div>
      <div class="image-box" data-project="proj4"><img src="image/jaaj4.webp" alt="Projet 4"></div>
    </div>
    <div class="column" id="right-col">
      <div class="image-box" data-project="proj5"><img src="image/jaaj4.webp" alt="Projet 5"></div>
      <div class="image-box" data-project="proj6"><img src="image/anim-baton(1).webp" alt="Projet 6"></div>
      <div class="image-box" data-project="proj7"><img src="image/client-logo(3).webp" alt="Projet 7"></div>
      <div class="image-box" data-project="proj8"><img src="image/client-illu(4).webp" alt="Projet 8"></div>
    </div>
  </div>

  <!-- PAGE PROJET -->
  <div id="project-container">
    <div id="project-content">
      <div id="project-layout">

        <!-- COLONNE GAUCHE : texte + nav -->
        <div id="project-text">
          <button id="back-btn" onclick="goHome()">← RETOUR</button>
          <span id="project-type-label"></span>
          <h2 id="project-title"></h2>
          <div class="project-info"><span id="project-subtitle"></span></div>
          <p id="project-desc"></p>
          <img id="project-text-image" src="" alt="">
          <div id="project-text-buttons">
            <button id="prev-project">❮</button>
            <button id="next-project">❯</button>
          </div>
        </div>

        <!-- COLONNE DROITE : images scrollables -->
        <div id="project-media">
          <div id="project-images"></div>
        </div>

      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
